services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notify-service-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-notify_service}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-notify_test}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      QUEUE_CONNECTION: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notify-service

  nginx:
    image: nginx:1.27-alpine
    container_name: notify-service-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - notify-service

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
          WWWUSER: ${WWWUSER:-1000}
          WWWGROUP: ${WWWGROUP:-1000}
    container_name: notify-service-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work rabbitmq --tries=3 --sleep=3
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-notify_service}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-notify_test}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      QUEUE_CONNECTION: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notify-service

  postgres:
    image: postgres:17-alpine
    container_name: notify-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-notify_service}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-root} -d ${DB_DATABASE:-notify_service}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notify-service

  redis:
    image: redis:7-alpine
    container_name: notify-service-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notify-service

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: notify-service-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-notify_test}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notify-service

networks:
  notify-service:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
